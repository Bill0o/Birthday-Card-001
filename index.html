<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 100%;
            background-color: #D0629B;

        }

        h1{
            font-weight: bolder;
            color: #FFDA22;
            text-align: center;

        }

        #letter{
            margin-left: 5%;
            margin-right: 5%;
            height: auto;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0px 8px 16px -2px black;
            text-decoration: none;
            color: #00171f;
            
            padding: 25px;

            transition: transform 0.3s ease;

        }

        .big{
            font-weight: bolder;
            font-size: larger;

        }

        .letter{
            font-size: large;

        }

        .img{
            display: flex;
            justify-self: center;
            height: 450px;

        }

    </style>
</head>
<body>
    <h1>🎉HAPPY BIRTHDAY✨<br>
    BELOVED AUNT TRINH</h1>

    <div id="letter">
        <a class="big">Dearest Aunt Trinh,</a>
        <br>
        <a class="letter"><span style="color: #E03616;"><strong>Happy Birthday</strong></span> to you🎉.Today is your first day of another 365-day journey, I hope your adventure on this new chapter will be filled with <span style="color: #4AAD52;"><strong>happiness</strong></span>⭐ and <span style="color: #ffc70f;"><strong>fortune</strong></span>🍀.
        <span style="color: #1F75FF;"><strong>Best wishes</strong></span> on your special day!</a>
        <br>
        <br>
        <a class="img"><img src="Cake.png"></a>
        <br>
        <a class="big">Sincerely,<br>Your nephew, Bill.</a>
    </div>
</body>
</html>
